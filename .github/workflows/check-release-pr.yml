name: Check Release PR

on:
  pull_request:
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  check_release_pr:
    name: Check Release PR
    if: startsWith(github.head_ref, 'chore/release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout faker
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: faker

      - name: Checkout playground
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: faker-js/playground
          path: playground

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: faker/package.json

      - name: Set node version to 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: 'pnpm'
          cache-dependency-path: |
            faker/pnpm-lock.yaml
            playground/pnpm-lock.yaml

      - name: Install deps - faker
        run: |
          cd faker
          pnpm install

      - name: Build - faker
        run: |
          cd faker
          pnpm run build

      - name: Install deps - playground
        run: |
          cd playground
          sed -i 's/overrides-for-release/overrides/' package.json
          pnpm install --no-frozen-lockfile

      - name: Build - playground
        run: |
          cd playground
          pnpm run build

      - name: Test - playground
        run: |
          cd playground
          pnpm run test
